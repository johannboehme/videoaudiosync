name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_call:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Set up Rust (for the sync-core WASM crate)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo registry + sync-core target
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            frontend/wasm/sync-core/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('frontend/wasm/sync-core/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend deps (postinstall copies ffmpeg-core into public/)
        run: npm ci --no-audit --no-fund --legacy-peer-deps

      - name: Cargo test (Rust sync-core)
        working-directory: frontend/wasm/sync-core
        run: cargo test --quiet

      - name: Install wasm-pack
        run: cargo install --locked wasm-pack

      - name: Build sync-core WASM (lint + tests import its generated .d.ts)
        run: npm run wasm:build

      - name: Type-check
        run: npm run lint

      - name: Unit tests (vitest jsdom)
        run: npm test
