# Host-side nginx vhost. Sits in front of the TK-1 container,
# terminates TLS via certbot, and proxies to the container's static
# nginx on 127.0.0.1:8000.

# DSGVO: anonymise the client IP before it ever hits a logfile. Last
# IPv4 octet → .0; bottom 80 bits of IPv6 → ::. The full address still
# reaches the upstream via X-Real-IP for the request lifetime, but
# nothing identifying ends up persisted.
# Place these blocks at http {} scope in nginx.conf — keeping the
# directives here (commented) so the intent stays with the vhost.
#
#   map $remote_addr $remote_addr_anon {
#       "~(?P<ip>\d+\.\d+\.\d+)\.\d+"       $ip.0;
#       "~(?P<ip>[^:]+:[^:]+:[^:]+:[^:]+):" $ip::;
#       default                              0.0.0.0;
#   }
#
#   log_format anon '$remote_addr_anon - $remote_user [$time_local] '
#                   '"$request" $status $body_bytes_sent '
#                   '"$http_referer" "$http_user_agent"';

server {
    listen 80;
    listen [::]:80;
    server_name sync.johannboehme.de;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sync.johannboehme.de;

    # Filled in by certbot --nginx
    # ssl_certificate /etc/letsencrypt/live/sync.johannboehme.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sync.johannboehme.de/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # DSGVO: log only the anonymised remote address. `anon` log_format and
    # the $remote_addr_anon map must be defined at http {} scope (see the
    # block at the top of this file).
    access_log /var/log/nginx/sync.access.log anon;

    # Pass real client info so the SPA's hostname-aware features keep working.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # The container already sets COOP/COEP. We pass them through unchanged
    # so cross-origin isolation survives the proxy hop.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_pass_header Cross-Origin-Opener-Policy;
        proxy_pass_header Cross-Origin-Embedder-Policy;
    }
}
