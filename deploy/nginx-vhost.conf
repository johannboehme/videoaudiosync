# /etc/nginx/sites-available/sync.johannboehme.de
# Symlink into sites-enabled. Certbot will manage the TLS bits below
# (commented out until certbot --nginx is run for the first time).

server {
    listen 80;
    listen [::]:80;
    server_name sync.johannboehme.de;

    # Allow Let's Encrypt http-01 challenges (certbot writes here).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # certbot --nginx will rewrite this block to redirect to https.
    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sync.johannboehme.de;

    # Filled in by certbot --nginx
    # ssl_certificate /etc/letsencrypt/live/sync.johannboehme.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sync.johannboehme.de/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Big uploads (videos can be hundreds of MB).
    client_max_body_size 2g;
    client_body_timeout 600s;

    # SSE needs unbuffered streaming.
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 1h;
    proxy_send_timeout 1h;

    # Pass real client info so FastAPI's secure-cookie detection works.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $host;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    location / {
        proxy_pass http://127.0.0.1:8000;
    }
}
