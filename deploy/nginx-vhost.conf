# Host-side nginx vhost. Sits in front of the videoaudiosync container,
# terminates TLS via certbot, and proxies to the container's static
# nginx on 127.0.0.1:8000.

server {
    listen 80;
    listen [::]:80;
    server_name sync.johannboehme.de;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name sync.johannboehme.de;

    # Filled in by certbot --nginx
    # ssl_certificate /etc/letsencrypt/live/sync.johannboehme.de/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/sync.johannboehme.de/privkey.pem;
    # include /etc/letsencrypt/options-ssl-nginx.conf;
    # ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Pass real client info so the SPA's hostname-aware features keep working.
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_http_version 1.1;
    proxy_set_header Connection "";

    # The container already sets COOP/COEP. We pass them through unchanged
    # so cross-origin isolation survives the proxy hop.
    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_pass_header Cross-Origin-Opener-Policy;
        proxy_pass_header Cross-Origin-Embedder-Policy;
    }
}
