# nginx server block running INSIDE the videoaudiosync container.
# Front-of-house TLS termination is the host's nginx (deploy/nginx-vhost.conf)
# which proxies to 127.0.0.1:8000 → 80 in this container.

server {
    listen 80 default_server;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Cross-origin isolation is mandatory: SharedArrayBuffer, WASM threads,
    # and ffmpeg.wasm need `crossOriginIsolated === true`.
    add_header Cross-Origin-Opener-Policy "same-origin" always;
    add_header Cross-Origin-Embedder-Policy "require-corp" always;
    add_header Cross-Origin-Resource-Policy "same-origin" always;

    # Reasonable defaults for a single-page app.
    add_header Cache-Control "no-cache" always;

    # WASM and JavaScript should be served with the right MIME types.
    types {
        application/wasm wasm;
    }

    # Long cache for hashed static assets emitted by Vite under /assets/.
    location /assets/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # ffmpeg.wasm + jassub assets we copy verbatim from /public.
    location /ffmpeg-core/ {
        add_header Cross-Origin-Opener-Policy "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
        add_header Cross-Origin-Resource-Policy "same-origin" always;
        add_header Cache-Control "public, max-age=31536000, immutable" always;
        try_files $uri =404;
    }

    # SPA fallback: any path that doesn't match a file falls back to index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
