services:
  app:
    build:
      context: .
      # Use host networking for the build stage so apt/npm/cargo can resolve
      # DNS on hosts where nftables blocks the default docker bridge (e.g.
      # netcup VPS). Runtime networking is unaffected — the container still
      # gets its own bridge IP for the host nginx to proxy into.
      network: host
      # Per-instance build-time config. Values come from the repo-root
      # `.env` (auto-loaded by docker-compose). Missing vars are passed
      # through as empty strings; the legal pages then render an "Imprint
      # not configured" placeholder. See `.env.example` for the schema.
      args:
        VITE_IMPRESSUM_NAME: "${VITE_IMPRESSUM_NAME:-}"
        VITE_IMPRESSUM_ADDRESS_LINE_1: "${VITE_IMPRESSUM_ADDRESS_LINE_1:-}"
        VITE_IMPRESSUM_ADDRESS_LINE_2: "${VITE_IMPRESSUM_ADDRESS_LINE_2:-}"
        VITE_IMPRESSUM_COUNTRY: "${VITE_IMPRESSUM_COUNTRY:-}"
        VITE_IMPRESSUM_EMAIL: "${VITE_IMPRESSUM_EMAIL:-}"
        VITE_DSGVO_AUTHORITY_NAME: "${VITE_DSGVO_AUTHORITY_NAME:-}"
        VITE_DSGVO_AUTHORITY_ADDRESS: "${VITE_DSGVO_AUTHORITY_ADDRESS:-}"
    container_name: videoaudiosync
    restart: unless-stopped
    # The container only serves the static SPA bundle; no /data volume,
    # no env secrets — everything user-state lives in the browser (OPFS +
    # IndexedDB). The host nginx terminates TLS and proxies to port 80.
    ports:
      - "127.0.0.1:8000:80"
