services:
  app:
    build:
      context: .
      # Use host networking for the build stage so apt/npm/cargo can resolve
      # DNS on hosts where nftables blocks the default docker bridge (e.g.
      # netcup VPS). Runtime networking is unaffected — the container still
      # gets its own bridge IP for the host nginx to proxy into.
      network: host
    container_name: videoaudiosync
    restart: unless-stopped
    # The container only serves the static SPA bundle; no /data volume,
    # no env secrets — everything user-state lives in the browser (OPFS +
    # IndexedDB). The host nginx terminates TLS and proxies to port 80.
    ports:
      - "127.0.0.1:8000:80"
